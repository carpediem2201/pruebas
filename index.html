<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi sitio Architect</title>
    <style>
        .container{max-width:900px;margin:0 auto;padding:20px}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;color:#333;margin:0;padding:0}
        header{background:#2d2d2d;color:#fff;padding:30px 0;border-bottom:4px solid #ff6600}
        header h1{margin:0;font-size:2.5em}
        header h1 a{color:#fff;text-decoration:none}
        header p{color:#ccc;margin:10px 0 0}
        footer{background:#f4f4f4;padding:20px 0;margin-top:40px;text-align:center;color:#666;font-size:0.9em}
        #main_content{background:#fff;padding:20px 0}
        .btn{display:inline-block;background:#ff6600;color:#fff;padding:10px 20px;text-decoration:none;border-radius:5px;margin-top:10px}
        .btn:hover{background:#e05500}
        h1,h2,h3{color:#2d2d2d}
        a{color:#ff6600}
        code{background:#f4f4f4;padding:2px 5px;border-radius:3px}
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Mi sitio web con Architect</h1>
            <p>Un tema elegante y profesional para GitHub Pages</p>
        </div>
    </header>

    <div class="container">
        <section id="main_content">
            <h2>Bienvenido a mi sitio</h2>
            <p>AQUÍ PON TU FRASE ORIGINAL</p>
            
            <p>Este es mi sitio web creado con GitHub Pages.</p>
        </section>
    </div>

    <footer>
        <div class="container">
            <p>Creado con GitHub Pages</p>
        </div>
    </footer>
</body>
</html>
