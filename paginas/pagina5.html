<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opción 2</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#2d2d2d;color:#fff;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
        .container{max-width:600px;margin:0 auto;padding:40px 20px;text-align:center}
        .card{background:rgba(255,255,255,0.1);border-radius:16px;padding:40px;backdrop-filter:blur(10px)}
        h1{font-size:2rem;margin-bottom:20px}
        p{font-size:1.2rem;margin-bottom:30px;opacity:0.9}
        .btn{display:inline-block;background:#ff6600;color:#fff;padding:12px 30px;border-radius:8px;text-decoration:none;font-weight:bold;transition:all 0.3s}
        .btn:hover{background:#e05500;transform:translateY(-2px)}
        footer{text-align:center;padding:20px;margin-top:auto;opacity:0.7}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📍 Opción 2</h1>
            <p>Has seleccionado la Opción 2</p>
            <a href="#" id="backButton" class="btn">← Volver al tema anterior</a>
        </div>
    </div>
    <footer>
        <p>© 2025 - Mi Sitio Web</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let tema = urlParams.get('tema');
        
        if (!tema && document.referrer) {
            const referrer = document.referrer;
            if (referrer.includes('tema-clasico')) tema = 'clasico';
            else if (referrer.includes('tema-oscuro')) tema = 'oscuro';
            else if (referrer.includes('tema-claro')) tema = 'claro';
            else if (referrer.includes('tema-tech')) tema = 'tech';
            else if (referrer.includes('tema-natural')) tema = 'natural';
            else if (referrer.includes('tema-card')) tema = 'card';
        }
        
        if (!tema) tema = 'clasico';
        
        const backButton = document.getElementById('backButton');
        backButton.href = `../tema-${tema}.html`;
        
        const btn = document.querySelector('.btn');
        const body = document.body;
        
        if (tema === 'clasico') { body.style.background = '#2d2d2d'; btn.style.background = '#ff6600'; }
        else if (tema === 'oscuro') { body.style.background = '#0a0a0a'; btn.style.background = '#ff6600'; }
        else if (tema === 'claro') { body.style.background = '#fafafa'; body.style.color = '#333'; btn.style.background = '#3498db'; }
        else if (tema === 'tech') { body.style.background = '#0d0d0d'; btn.style.background = '#00ff88'; btn.style.color = '#000'; }
        else if (tema === 'natural') { body.style.background = '#e8f5e9'; body.style.color = '#2e5c2e'; btn.style.background = '#4caf50'; }
        else if (tema === 'card') { body.style.background = '#f0f2f5'; body.style.color = '#333'; btn.style.background = '#e94560'; }
    </script>
</body>
</html>
