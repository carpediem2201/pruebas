<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema Oscuro | Minimalista</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;line-height:1.6}
        .container{max-width:900px;margin:0 auto;padding:20px}
        header{background:#000;padding:40px 0;border-bottom:1px solid #333;text-align:center}
        header h1{font-size:2.5rem;color:#fff}
        header p{color:#888}
        nav{background:#111;padding:0;border-bottom:1px solid #222}
        .menu{list-style:none;display:flex;justify-content:center;flex-wrap:wrap}
        .menu li a{display:block;padding:15px 25px;color:#ccc;text-decoration:none}
        .menu li a:hover,.menu li a.activo{color:#fff;background:#1a1a1a}
        .card{background:#111;padding:25px;border-radius:12px;margin:20px 0;border:1px solid #222}
        footer{background:#000;padding:20px 0;text-align:center;margin-top:40px;color:#666}
        .btn{display:inline-block;background:#333;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none}
        .btn:hover{background:#444}
        @media(max-width:768px){.menu{flex-direction:column}}
    </style>
</head>
<body>
    <header><div class="container"><h1>🌙 Tema Oscuro</h1><p>Minimalista y elegante</p></div></header>
    <nav><div class="container"><ul class="menu"><li><a href="#" class="activo">Inicio</a></li><li><a href="#">Sobre</a></li><li><a href="#">Contacto</a></li></ul></div></nav>
    <div class="container"><div class="card"><h2>Diseño Minimalista</h2><p>Perfecto para una experiencia visual nocturna. Fondo oscuro, texto suave y bordes sutiles.</p><a href="index.html" class="btn">← Volver al selector</a></div></div>
    <footer><div class="container"><p>© 2025 - Tema Oscuro | <a href="index.html" style="color:#888">Volver</a></p></div></footer>
</body>
</html>
